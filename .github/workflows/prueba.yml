name: Secure CI/CD Pipeline (DevSecOps)

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    name: 🛡️ Security & Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Setup Node (Necesario para que Snyk vea las dependencias)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Instalar dependencias para que Snyk pueda analizarlas
      # Usamos la subcarpeta coindash-api
      - name: Install dependencies for scan
        working-directory: coindash-api
        run: npm install

      # 3. Escaneo de Dependencias (SCA) con Snyk
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk Test
        shell: bash
        run: snyk test --severity-threshold=high --file=coindash-api/package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 4. Análisis Estático (SAST) con CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-and-test:
    name: 🏗️ Build & Test
    needs: security-scan # ⬅️ Solo corre si la seguridad pasa
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: coindash-api/package-lock.json

      - name: Install dependencies
        working-directory: coindash-api
        run: npm ci

      - name: Run tests
        working-directory: coindash-api
        env:
          # Aquí usarías tus Secrets de GitHub
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
        run: npm test

  container-security:
    name: 🐳 Container Scan
    needs: build-and-test
    runs-